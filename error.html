<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Error</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .error-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .error-code {
      font-size: 6rem;
      font-weight: bold;
      color: #1085df;
      margin: 0;
    }

    .error-message {
      font-size: 1.5rem;
      color: #333;
      margin: 10px 0;
    }

    .error-description {
      font-size: 1rem;
      color: #666;
      margin-bottom: 20px;
    }

    .home-btn a {
      text-decoration: none;
      background: #1085df;
      color: #fff;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 1rem;
      transition: background 0.3s ease;
    }

    .home-btn a:hover {
      background: #0d6bb8;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <p class="error-message">Page Not Found</p>
    <p class="error-description">Oops! The page you're looking for doesn't exist.</p>
    <div class="home-btn">
      <a href="/">Go Back to Homepage</a>
    </div>
  </div>
</body>
</html>
